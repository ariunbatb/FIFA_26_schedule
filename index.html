<title>ДАШТ 2026 — Тоглолтын хуваарь</title>
<style>
  :root{
    --bg:#f6f8fb; --card:#ffffff; --ink:#15243b; --muted:#64748b;
    --accent:#0e7a4d; --accent2:#1d4ed8; --line:#e2e8f0;
    --hl:#fff7e0; --hl-border:#f0b429;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:var(--bg); color:var(--ink); padding-bottom:40px;
  }
  header{
    background:linear-gradient(135deg,#0e7a4d 0%,#1d4ed8 60%,#b91c1c 100%);
    color:#fff; text-align:center; padding:24px 16px 18px;
  }
  header h1{font-size:1.6rem; letter-spacing:.5px;}
  header p{opacity:.92; margin-top:4px; font-size:.85rem;}
  .legend{
    margin:10px auto; padding:0 16px;
    color:var(--muted); font-size:.78rem; text-align:center;
  }
  .container{width:100%; padding:0 18px;}
  .days-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:14px;
    align-items:start;
  }
  @media(max-width:980px){.days-grid{grid-template-columns:1fr;}}
  .day{
    background:#fff; border:1px solid var(--line); border-radius:14px;
    padding:12px 14px 14px; box-shadow:0 1px 2px rgba(15,23,42,.05);
  }
  .day-header{
    display:flex; align-items:center; gap:8px; margin-bottom:10px;
  }
  .day-header h2{font-size:.95rem; white-space:nowrap;}
  .day-header .rule{flex:1; height:1px; background:var(--line);}
  .stage-tag{
    font-size:.62rem; font-weight:700; letter-spacing:.5px;
    color:#fff; background:var(--accent2); border-radius:99px; padding:2px 9px;
    white-space:nowrap;
  }
  .grid{
    display:grid; gap:8px;
    grid-template-columns:repeat(auto-fill, minmax(225px, 1fr));
  }
  .match{
    background:var(--bg); border:1px solid var(--line); border-radius:10px;
    padding:8px 10px; transition:all .18s ease;
  }
  .match .top{
    display:flex; justify-content:space-between; align-items:center;
    font-size:.64rem; color:var(--muted); margin-bottom:6px;
  }
  .match .top .time{
    font-size:.88rem; font-weight:800; color:var(--ink);
    background:#fff; border:1px solid var(--line);
    padding:1px 9px; border-radius:7px;
  }
  .match .group-badge{
    font-weight:700; color:var(--accent);
    background:#e8f5ef; padding:1px 7px; border-radius:99px;
  }
  .match .group-badge.ko{color:var(--accent2); background:#e7edfd;}
  .teams{
    display:flex; align-items:center; justify-content:center;
    gap:4px; flex-wrap:wrap; min-height:26px;
  }
  .team{
    display:inline-flex; align-items:center; gap:5px;
    font-weight:600; font-size:.8rem; cursor:pointer;
    border-radius:6px; padding:2px 4px;
    transition:background .15s;
  }
  .team:hover{background:#eef4ff;}
  .team .flag-img{
    width:22px; height:15px; object-fit:cover;
    border-radius:2px; border:1px solid var(--line);
    box-shadow:0 1px 2px rgba(0,0,0,.12); flex:none;
  }
  .team .flag-ph{
    width:22px; height:15px; border-radius:2px; flex:none;
    background:#e2e8f0; display:flex; align-items:center;
    justify-content:center; font-size:.6rem;
  }
  .team.tbd{color:var(--muted); font-weight:500; cursor:default; font-size:.72rem;}
  .team.tbd:hover{background:none;}
  .vs{font-size:.58rem; font-weight:700; color:var(--muted); letter-spacing:1px; flex:none;}
  .score{
    font-size:.95rem; font-weight:900; color:#fff;
    background:var(--accent); padding:1px 9px; border-radius:7px;
    flex:none; letter-spacing:1px;
  }
  .match.done{border-color:#bbe3cf; background:#f3faf6;}
  .meta{
    margin-top:6px; padding-top:5px; border-top:1px dashed var(--line);
    display:flex; gap:4px; flex-wrap:wrap; align-items:center;
  }
  .ch{
    font-size:.6rem; font-weight:800; letter-spacing:.4px; color:#fff;
    padding:2px 7px; border-radius:4px; white-space:nowrap;
  }
  /* tooltip with the hovered country's full schedule */
  #tip{
    display:none; position:fixed; z-index:50;
    background:#fff; border:1px solid var(--hl-border); border-radius:10px;
    box-shadow:0 8px 24px rgba(15,23,42,.18);
    padding:9px 12px; min-width:300px; pointer-events:none;
  }
  #tip .tip-head{
    display:flex; align-items:center; gap:6px;
    font-size:.78rem; font-weight:800; margin-bottom:6px;
    padding-bottom:5px; border-bottom:1px solid var(--line);
  }
  #tip .tip-row{
    display:flex; align-items:center; gap:8px;
    font-size:.72rem; padding:2.5px 0; color:var(--ink);
  }
  #tip .tip-date{color:var(--muted); width:88px; flex:none;}
  #tip .tip-time{font-weight:700; width:42px; flex:none;}
  #tip .tip-opp{display:flex; align-items:center; gap:5px; flex:1;}
  #tip img{width:18px; height:12px; object-fit:cover; border-radius:2px; border:1px solid var(--line);}
  #tip .ch{font-size:.55rem; padding:1px 5px;}
  /* highlight states */
  body.filtering .match{opacity:.25; filter:grayscale(.5);}
  body.filtering .match.lit{
    opacity:1; filter:none;
    background:var(--hl); border-color:var(--hl-border);
    box-shadow:0 3px 10px rgba(240,180,41,.3);
    transform:translateY(-1px);
  }
</style>
</head>

  app.appendChild(el);
});

// hover highlighting + schedule tooltip
const cards = document.querySelectorAll(".match");
const tip = document.createElement("div");
tip.id = "tip";
document.body.appendChild(tip);

const miniFlag = n => n === "TBD" ? "" :
  `<img src="https://flagcdn.com/w40/${CODE[n]}.png" alt="">`;

function showTip(el, c){
  const rows = M.filter(m => m[1] === c || m[2] === c).map(m => {
    const opp = m[1] === c ? m[2] : m[1];
    return `<div class="tip-row">
      <span class="tip-date">${dateMN(m[0], false)}</span>
      <span class="tip-time">${m[3]}</span>
      <span class="tip-opp">${miniFlag(opp)} ${MN[opp]}</span>
      ${chHTML(m[4].slice(0,1))}
    </div>`;
  }).join("");
  tip.innerHTML = `<div class="tip-head">${miniFlag(c)} ${MN[c]} — бүх тоглолт (УБ цагаар)</div>${rows}`;
  tip.style.display = "block";
  const r = el.getBoundingClientRect();
  const tw = tip.offsetWidth, th = tip.offsetHeight;
  let x = Math.min(r.left, innerWidth - tw - 10);
  let y = r.bottom + 8;
  if (y + th > innerHeight - 10) y = r.top - th - 8;
  tip.style.left = Math.max(8, x) + "px";
  tip.style.top  = Math.max(8, y) + "px";
}

document.querySelectorAll(".team:not(.tbd)").forEach(el => {
  el.addEventListener("mouseenter", () => {
    const c = el.dataset.c;
    document.body.classList.add("filtering");
    cards.forEach(card => {
      card.classList.toggle("lit", card.dataset.teams.split("|").includes(c));
    });
    showTip(el, c);
  });
  el.addEventListener("mouseleave", () => {
    document.body.classList.remove("filtering");
    cards.forEach(card => card.classList.remove("lit"));
    tip.style.display = "none";
  });
});

// ===== Match results from worldcup26.ir API =====
const API = "https://worldcup26.ir";
const TOKEN = "PASTE_YOUR_TOKEN_HERE"; // register once: POST /auth/register

async function loadScores(){
  if (TOKEN.startsWith("PASTE")) return; // not configured yet
  try {
    const opts = { headers: { "Authorization": "Bearer " + TOKEN } };
    const [teamsRes, gamesRes] = await Promise.all([
      fetch(API + "/get/teams", opts),
      fetch(API + "/get/games", opts)
    ]);
    if (!teamsRes.ok || !gamesRes.ok) throw new Error("API error " + teamsRes.status + "/" + gamesRes.status);
    const teams = await teamsRes.json();
    const games = await gamesRes.json();

    // map API team id -> fifa_code
    const idToCode = {};
    (Array.isArray(teams) ? teams : teams.data || []).forEach(t => {
      idToCode[t.id] = t.fifa_code;
    });
    // map our English name -> fifa code, then build "CODE|CODE" -> card lookup
    const cardByPair = {};
    cards.forEach(card => {
      const [a, b] = card.dataset.teams.split("|");
      if (FIFA[a] && FIFA[b]) {
        cardByPair[[FIFA[a], FIFA[b]].sort().join("|")] = card;
      }
    });

    (Array.isArray(games) ? games : games.data || []).forEach(g => {
      if (!g.finished) return; // only completed matches
      const hc = idToCode[g.home_team_id], ac = idToCode[g.away_team_id];
      if (!hc || !ac) return;
      const card = cardByPair[[hc, ac].sort().join("|")];
      if (!card) return;
      const vs = card.querySelector(".vs");
      if (!vs) return;
      // show real score in home-away order matching the card's layout
      const [cardA] = card.dataset.teams.split("|");
      const flip = FIFA[cardA] !== hc;
      const s1 = flip ? g.away_score : g.home_score;
      const s2 = flip ? g.home_score : g.away_score;
      vs.outerHTML = `<span class="score">${s1} : ${s2}</span>`;
      card.classList.add("done");
    });
  } catch (err) {
    console.warn("Score load failed:", err); // page still works without scores
  }
}
loadScores();
